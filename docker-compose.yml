services:
  routing-updater:
    image: ghcr.io/3apa3a-3aho3a/remnawave-routing-updater:latest
    container_name: remna-routing-updater
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Ваш личный шаблон (создаётся из template.json, не отслеживается git)
      - ./my-template.json:/app/template.json:ro
      - ./output:/app/output
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
